name: check-in-job

on:
  workflow_dispatch:  # 允许手动触发
  schedule:
      # 表达式生成  https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
    - cron: '0 2,14 * * *'  # 每天 02:00、14:00 UTC 执行（北京时间 10:00、22:00）

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'

    - name: Install dependencies
      run: |
        npm install
        npm install node-fetch

    - name: Run scheduled check-in
      run: |
        node _worker.js
      env:
        DOMAIN: ${{ secrets.DOMAIN }}
        COOKIE: ${{ secrets.COOKIE }}
        NEW_API_USER: ${{ secrets.NEW_API_USER }}
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_ID: ${{ secrets.TG_ID }}

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true

    - name: Keep repo alive
      run: |
        git config --local user.name "actions@github.com"
        git config --local user.email "GitHub Actions"
        git add .
        git commit --allow-empty -m "$(date '+%Y-%m-%d %H:%M:%S')更新"

    - name: Push to remote
      run:
        git push